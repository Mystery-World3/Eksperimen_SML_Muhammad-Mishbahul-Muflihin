name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'telco_raw/**'
      - 'preprocessing/automate_Muhammad-Mishbahul-Muflihin.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    - name: Run preprocessing
      run: python preprocessing/automate_Muhammad-Mishbahul-Muflihin.py

    - name: Commit and push changes
      run: |
        git config --local user.email "[EMAIL_ADDRESS]"
        git config --local user.name "GitHub Action"
        git add preprocessing/telco_preprocessing/
        git commit -m "Auto-update processed dataset" || echo "No changes to commit"
        git push